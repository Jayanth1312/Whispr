<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{TITLE}} — Whispr</title>
  <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css"/>
  <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Petrona';
      src: url('/fonts/Petrona.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: light !important;
      --brand: #16a34a;
      --brand-light: #4ade80;
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --font-serif: 'Petrona', Georgia, serif;
    }

    html, body, button, input, select, textarea {
      font-family: var(--font-sans);
      box-sizing: border-box;
    }
    *, *::before, *::after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: var(--background);
      color: var(--foreground);
      transition: background-color 0.2s, color 0.2s;
    }

    .page-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Navbar styling reproducing design-blur layout */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Floating Header Container */
    .header-container {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      max-width: 720px; margin: 1rem auto 1.25rem; width: calc(100% - 2rem);
    }

    nav {
      position: relative; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.5rem 0.5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      flex: 1; max-width: none;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }

    .nav-left { display: flex; align-items: center; gap: 0; }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; }
    .brand {
      font-size: 1.25rem; font-weight: 700; letter-spacing: -0.03em;
      color: var(--brand); text-decoration: none;
      transition: opacity 0.15s;
    }
    .brand:hover { text-decoration: none; opacity: 0.8; }

    .nav-btn {
      font-size: 0.85rem; font-weight: 600;
      padding: 0.6rem 1rem;
      border-radius: 25px; border: 1px solid var(--foreground);
      background: var(--foreground); color: var(--background);
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 0.4rem;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .nav-btn:hover { opacity: 0.9; }
    .nav-btn svg { width: 14px; height: 14px; stroke-width: 2.5; }

    .github-btn {
      font-size: 0.85rem; font-weight: 500;
      padding: 0.6rem 1rem;
      border-radius: 25px; border: 1px solid var(--border);
      background: transparent; color: var(--foreground);
      cursor: pointer; text-decoration: none; display: inline-flex;
      align-items: center; gap: 0.5rem;
      transition: all 0.15s;
    }
    .github-btn:hover { background: var(--secondary); }
    .github-btn svg { width: 14px; height: 14px; }

    .serif { font-family: var(--font-serif); }

    /* Feature pills matching small pills design */
    .feature-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 4rem;
    }
    .feature-card {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: 1px solid rgba(22, 163, 74, 0.15);
      border-radius: 999px;
      padding: 0.4rem 0.85rem;
      background: rgba(22, 163, 74, 0.04);
      color: var(--brand);
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .feature-card:hover {
      background: rgba(22, 163, 74, 0.08);
      border-color: rgba(22, 163, 74, 0.25);
      transform: translateY(-1px);
    }
    .feature-icon-wrapper {
      display: flex; align-items: center; justify-content: center;
    }
    .feature-icon-wrapper svg { width: 13px; height: 13px; stroke-width: 2.25; }
    .feature-title { font-size: 0.8rem; font-weight: 500; }

    /* Inline Sentence Pills */
    .inline-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      border: 1px solid rgba(22, 163, 74, 0.18);
      border-radius: 999px;
      padding: 0.02rem 0.55rem;
      background: rgba(22, 163, 74, 0.05);
      color: var(--brand);
      font-size: 0.92em;
      font-weight: 500;
      vertical-align: middle;
      margin: 0 0.15rem;
    }
    .inline-pill svg {
      width: 12px; height: 12px; stroke-width: 2.25; color: var(--brand);
    }

    /* Buttons inside content */
    button.primary-btn, button[type="submit"] {
      background: var(--foreground); color: var(--background);
      border: none; border-radius: 12px;
      padding: 0.85rem 2rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      transition: transform 0.1s, opacity 0.15s;
      border-radius: 25px;
    }
    button.primary-btn:hover, button[type="submit"]:hover { opacity: 0.9; }

    /* Custom Dashed Add Button layout */
    .dashed-add-btn {
      width: 100%; height: 60px;
      background: transparent;
      border: 2px dashed var(--brand) !important;
      border-radius: 16px !important;
      color: var(--brand);
      font-size: 1rem; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 0.65rem;
      cursor: pointer; transition: all 0.15s;
    }
    .dashed-add-btn:hover {
      opacity: 0.85;
    }
    .dashed-add-btn .plus-circle {
      width: 2rem; height: 2rem;
      border-radius: 50%; background: rgba(22, 163, 74, 0.08);
      display: flex; align-items: center; justify-content: center;
      color: var(--brand);
    }
    .dashed-add-btn .plus-circle svg {
      width: 14px; height: 14px; stroke-width: 3;
    }

    /* Standard Form Tag overrides for design-matched styling */
    fieldset {
      border: 1px solid var(--border) !important;
      border-radius: 16px !important;
      padding: 1.5rem !important;
      margin-bottom: 2rem !important;
      background: var(--card) !important;
      position: relative;
    }
    legend {
      font-size: 0.9rem !important; font-weight: 600 !important;
      padding: 0 0.5rem !important; color: var(--foreground) !important;
      background: var(--background); margin-left: 0.5rem;
    }
    label {
      font-style: normal;
      font-size: 0.875rem; font-weight: 500;
      color: var(--foreground);
      margin-bottom: 0.4rem; display: block;
    }
    input[type="text"], select, textarea {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      color: var(--foreground);
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    input[type="text"]:focus, select:focus, textarea:focus {
      border-color: var(--brand) !important;
      outline: none;
    }

    /* Other styles... */

    /* Question builder blocks */
    .q-block {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 1rem; margin-bottom: 0.75rem; background: var(--bg);
    }

    /* Response types */
    .answer-card {
      padding: 0.75rem 1rem; border-left: 3px solid var(--brand-light);
      background: var(--bg2); border-radius: 0 6px 6px 0;
      margin-bottom: 0.5rem; font-size: 0.95rem; line-height: 1.55;
    }
    .rating-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.4rem; }
    .rating-row input[type=radio] { display: none; }
    .rating-row label {
      width: 2.4rem; height: 2.4rem; display: flex; align-items: center;
      justify-content: center; border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: background 0.1s, border-color 0.1s;
    }
    .rating-row input[type=radio]:checked + label { background: var(--brand); color: #fff; border-color: var(--brand); }
    .rating-row label:hover { border-color: var(--brand-light); }

    .yesno-row { display: flex; gap: 0.75rem; margin-top: 0.4rem; }
    .yesno-row input[type=radio] { display: none; }
    .yesno-row label {
      flex: 1; padding: 0.6rem; text-align: center;
      border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; font-size: 0.9rem; transition: background 0.1s, border-color 0.1s;
    }
    .yesno-row input[type=radio]:checked + label { background: var(--brand); color: #fff; border-color: var(--brand); }

    .mood-row { display: flex; gap: 0.5rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .mood-row input[type=radio] { display: none; }
    .mood-row label {
      font-size: 1.6rem; cursor: pointer; padding: 0.3rem 0.5rem;
      border: 2px solid transparent; border-radius: 8px;
      transition: border-color 0.1s, transform 0.1s; line-height: 1;
    }
    .mood-row input[type=radio]:checked + label { border-color: var(--brand); transform: scale(1.15); }

    .choices-list { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.4rem; }
    .choices-list label {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.55rem 0.8rem; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; font-size: 0.9rem; transition: border-color 0.1s;
    }
    .choices-list label:hover { border-color: var(--brand-light); }
    .choices-list input:checked + span { color: var(--brand); font-weight: 500; }

    .rank-list { list-style: none; padding: 0; margin-top: 0.4rem; }
    .rank-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 0.75rem; margin-bottom: 0.4rem;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); cursor: grab; user-select: none; font-size: 0.9rem;
    }
    .rank-item:active { cursor: grabbing; }
    .rank-handle { color: var(--fg3); font-size: 0.8rem; }
    .rank-num {
      min-width: 1.4rem; height: 1.4rem; background: var(--brand); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }

    /* Results */
    .expire-tag { font-size: 0.8rem; }
    .results-empty { text-align: center; padding: 3rem 1rem; color: var(--fg2); }
    .q-type-badge {
      display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem;
      border-radius: 99px; background: var(--bg2); color: var(--fg2);
      margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .stat-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .stat-chip { font-size: 0.8rem; padding: 0.2rem 0.65rem; border-radius: 99px; background: var(--bg2); color: var(--fg2); }
    .bar-wrap { margin: 0.5rem 0; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.2rem; }
    .bar-track { height: 8px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--brand-light); border-radius: 99px; transition: width 0.4s; }

    .page-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 1rem;
      box-sizing: border-box;
    }
    @media (max-width: 640px) {
      .hide-mobile { display: none !important; }
      .nav-right { gap: 0.4rem; }
      .header-container { width: calc(100% - 1rem); margin: 0.75rem auto; }
      nav { padding: 0.45rem 0.45rem 0.45rem 1rem; }
      .brand { font-size: 1.35rem !important; }
      .nav-btn, .github-btn { height: 38px; padding-top: 0; padding-bottom: 0; display: inline-flex; align-items: center; }
    }
  </style>
  <script>
    // Force light theme
    document.documentElement.setAttribute('data-theme', 'light');
  </script>
</head>
<body>
  <div class="header-container">
    <nav>
      <div class="nav-left">
        <a href="/" class="brand serif" style="font-size: 1.5rem; font-weight: 500;">Whispr</a>
      </div>
      <div class="nav-right">
        <a href="https://github.com/whispr-app/whispr" target="_blank" rel="noopener noreferrer" class="github-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          <span class="hide-mobile">Star</span>
        </a>
        <a href="/create" class="nav-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          New<span class="hide-mobile">session</span>
        </a>
      </div>
    </nav>
    <button onclick="toggleSidebar()" style="width:52px; height:52px; border-radius:50%; border:1px solid var(--border); background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--foreground); flex-shrink:0;">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
    </button>

  </div>

  <!-- Sidebar overlay -->
  <div id="sb-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:998;" onclick="toggleSidebar()"></div>
  <!-- Sidebar sheet -->
  <div id="sidebar-sheet" style="position:fixed; top:0; right:0; bottom:0; width:360px; max-width:85vw; background:var(--background); border-left:1px solid var(--border); z-index:999; transform:translateX(100%); transition:transform 0.2s ease-out; box-shadow:-4px 0 20px rgba(0,0,0,0.05); padding:1.5rem; overflow-y:auto;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem;">
      <h3 class="serif" style="margin:0;">Saved Links</h3>
      <button onclick="toggleSidebar()" style="background:none; border:none; cursor:pointer; font-size:1.5rem; color:var(--muted-foreground);">&times;</button>
    </div>
    <div id="saved-list"></div>
  </div>

  <script>
    function toggleSidebar() {
      const sheet = document.getElementById('sidebar-sheet');
      const over = document.getElementById('sb-overlay');
      const open = sheet.style.transform === 'translateX(0px)';
      sheet.style.transform = open ? 'translateX(100%)' : 'translateX(0px)';
      over.style.display = open ? 'none' : 'block';
      if (!open) loadSavedLinks();
    }

    function loadSavedLinks() {
      const links = JSON.parse(localStorage.getItem('whispr_saved') || '[]');
      const container = document.getElementById('saved-list');
      if (links.length === 0) {
        container.innerHTML = '<p style="color:var(--muted-foreground); font-size:0.9rem; text-align:center; margin-top:2rem;">No saved links yet.</p>';
        return;
      }

      // Sort links descending by savedAt
      links.sort((a, b) => new Date(b.savedAt || 0) - new Date(a.savedAt || 0));

      // Group by date
      const groups = {};
      links.forEach(l => {
        const d = l.savedAt ? new Date(l.savedAt) : new Date();
        const dateKey = l.savedAt ? d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'Older';
        if (!groups[dateKey]) groups[dateKey] = [];
        groups[dateKey].push(l);
      });

      window.copySidebarLink = function(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
          const orig = btn.textContent;
          btn.textContent = 'Copied!';
          setTimeout(() => btn.textContent = orig, 1000);
        });
      };

      container.innerHTML = Object.keys(groups).map(date => {
        return `
          <div style="font-size:0.75rem; font-weight:600; color:var(--muted-foreground); margin:1.5rem 0 0.5rem; text-transform:uppercase; letter-spacing:0.04em; padding-left:0.25rem;">${date}</div>
          ${groups[date].map(l => {
            const timeStr = l.savedAt ? new Date(l.savedAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) : '';
            return `
              <div style="border:1px solid var(--border); border-radius:14px; padding:0.85rem; margin-bottom:0.75rem; background:var(--card); position:relative;">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:0.4rem;">
                  <div class="serif" style="font-weight:600; font-size:0.95rem; color:var(--foreground); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;">${l.topic || 'Session'}</div>
                  ${timeStr ? `<span style="font-size:0.7rem; color:var(--muted-foreground);">${timeStr}</span>` : ''}
                </div>
                <div style="display:flex; align-items:center; gap:0.5rem; font-size:0.8rem;">
                  <button onclick="copySidebarLink('${l.url}', this)" style="background:none; border:none; color:var(--brand); cursor:pointer; font-weight:600; padding:0; font-size:0.875rem;">Copy</button>
                  <button onclick="removeSaved('${l.url}')" style="margin-left:auto; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:500;">Remove</button>
                </div>
              </div>
            `;
          }).join('')}
        `;
      }).join('');
    }

    function removeSaved(url) {
      const links = JSON.parse(localStorage.getItem('whispr_saved') || '[]');
      const filtered = links.filter(l => l.url !== url);
      localStorage.setItem('whispr_saved', JSON.stringify(filtered));
      loadSavedLinks();
    }
  </script>

  <div class="page-inner">
    {{BODY}}
  </div>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
